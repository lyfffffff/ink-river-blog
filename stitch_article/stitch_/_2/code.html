<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', serif;
        }
        .chinese-serif {
            font-family: "Noto Serif SC", serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex items-center justify-between h-16">
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
<h2 class="text-lg font-bold font-display tracking-tight text-slate-900 dark:text-slate-100">墨色山河 <span class="font-normal text-slate-400 mx-2">/</span> 新文章</h2>
</div>
<div class="flex items-center gap-3">
<button class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                        预览
                    </button>
<button class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                        保存草稿
                    </button>
<button class="px-6 py-2 text-sm font-bold text-white bg-primary rounded-lg shadow-sm hover:opacity-90 transition-all">
                        发布
                    </button>
</div>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
<div class="flex flex-col lg:flex-row gap-8">
<!-- Editor Section -->
<div class="flex-1 space-y-6">
<!-- Title Input -->
<div class="bg-transparent">
<input class="w-full bg-transparent border-none p-0 text-4xl font-bold focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 text-slate-900 dark:text-slate-100 font-display" placeholder="请输入文章标题" type="text"/>
</div>
<!-- Rich Text Toolbar -->
<div class="flex flex-wrap items-center gap-1 p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm">
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">format_bold</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">format_italic</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">format_list_bulleted</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">format_quote</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">image</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">link</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">code</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">redo</span>
</button>
</div>
<!-- Editor Area -->
<div class="relative min-h-[600px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-8 shadow-sm">
<div class="flex items-center gap-3 mb-6">
<div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700">
<img class="w-full h-full object-cover" data-alt="User avatar for profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk5kXG6VgqqvW-m61AFYJJ951KNLCxTSNDPML0Tzdr_qWXrGpvcjpbR-okk6K0Lmz-K6-DOmuQnqNHADdGEFLLLjcm1hyDK546tpq_aOS6tmLaLmbMQyZlTHAJXCBKuSVlw_-1_WBOMipCJwocYl81WkEVQ0RlbB4ui-4737_GjN-zaGJeFQusJZakBaXow84swttCx4U7nc7xDW4aI9y4C9tWXGpUq7misoz8Vubo1DD83COa3dKGAprqmDfQD9VmtffkmiVZ2wcl"/>
</div>
<span class="text-slate-400 text-sm italic">在这笔墨间，书写你的山河...</span>
</div>
<textarea class="w-full h-full min-h-[500px] bg-transparent border-none p-0 focus:ring-0 text-lg leading-relaxed text-slate-700 dark:text-slate-300 placeholder:text-slate-300 resize-none" placeholder="点击这里开始创作..."></textarea>
</div>
</div>
<!-- Sidebar Section -->
<aside class="w-full lg:w-80 space-y-6">
<!-- Cover Image -->
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm">
<h3 class="text-sm font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">image</span> 文章封面
                    </h3>
<div class="aspect-video rounded-lg bg-slate-50 dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-slate-400 hover:border-primary transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">add_photo_alternate</span>
<span class="text-xs mt-2">点击上传图片</span>
</div>
</div>
<!-- Settings -->
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm space-y-6">
<!-- Category -->
<div>
<h3 class="text-sm font-bold mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">folder</span> 分类
                        </h3>
<select class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:border-primary focus:ring-primary">
<option>默认分类</option>
<option>山河漫步</option>
<option>笔墨生活</option>
<option>技术沉淀</option>
</select>
</div>
<!-- Tags -->
<div>
<h3 class="text-sm font-bold mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">label</span> 标签
                        </h3>
<div class="flex flex-wrap gap-2 mb-3">
<span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded flex items-center gap-1">
                                旅行 <span class="material-symbols-outlined text-[10px] cursor-pointer">close</span>
</span>
<span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded flex items-center gap-1">
                                摄影 <span class="material-symbols-outlined text-[10px] cursor-pointer">close</span>
</span>
</div>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm py-1.5 focus:border-primary focus:ring-primary" placeholder="添加新标签..." type="text"/>
</div>
</div>
<!-- Visibility -->
<div>
<h3 class="text-sm font-bold mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">visibility</span> 可见性
                        </h3>
<div class="space-y-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input checked="" class="text-primary focus:ring-primary size-4" name="visibility" type="radio"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary">公开</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="text-primary focus:ring-primary size-4" name="visibility" type="radio"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary">私密</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="text-primary focus:ring-primary size-4" name="visibility" type="radio"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary">密码访问</span>
</label>
</div>
</div>
</div>
<!-- Help/Guidelines Card -->
<div class="bg-primary/5 border border-primary/20 rounded-xl p-5">
<h4 class="text-sm font-bold text-primary mb-2">创作小贴士</h4>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                        “笔墨之间，自有乾坤。” 建议您在写作时适当增加空行，让文章如山河画卷般呼吸自然。
                    </p>
</div>
</aside>
</div>
</main>
<!-- Floating Footer (Mobile only) -->
<div class="fixed bottom-0 left-0 right-0 lg:hidden bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 p-4 z-50">
<div class="flex gap-4">
<button class="flex-1 px-4 py-2 text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-lg">
                保存草稿
            </button>
<button class="flex-1 px-4 py-2 text-sm font-bold text-white bg-primary rounded-lg shadow-sm">
                发布
            </button>
</div>
</div>
</body></html>
