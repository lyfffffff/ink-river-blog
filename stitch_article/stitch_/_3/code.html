<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#11b4d4",
              "background-light": "#f6f8f8",
              "background-dark": "#101f22",
              "ink-neutral": "#4a5d61",
            },
            fontFamily: {
              "display": ["Newsreader", "serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Newsreader', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Background Content Simulation (Blog Post Context) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 pointer-events-none select-none p-8">
<div class="max-w-3xl mx-auto space-y-6">
<div class="h-10 w-3/4 bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="space-y-3">
<div class="h-4 w-full bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-4 w-full bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-4 w-5/6 bg-slate-200 dark:bg-slate-800 rounded"></div>
</div>
<div class="aspect-video w-full rounded-xl bg-slate-200 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-slate-400">image</span>
</div>
</div>
</div>
<!-- Double Confirmation Dialog Overlay -->
<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-background-dark/60 backdrop-blur-sm transition-opacity">
<!-- Modal Container -->
<div class="relative w-full max-w-md transform overflow-hidden rounded-t-xl sm:rounded-xl bg-white dark:bg-slate-900 shadow-2xl transition-all border border-slate-200 dark:border-slate-800">
<!-- BottomSheetHandle for mobile feel -->
<div class="flex h-6 w-full items-center justify-center sm:hidden">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="px-6 pt-6 pb-8 text-center sm:px-8 sm:pt-10">
<!-- Icon/Warning Visual -->
<div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-red-50 dark:bg-red-900/20">
<span class="material-symbols-outlined text-red-500 text-3xl">delete_forever</span>
</div>
<!-- Title -->
<h3 class="text-xl font-bold text-slate-900 dark:text-slate-100 font-display">
                    确认删除此文章吗？
                </h3>
<!-- Message -->
<p class="mt-4 text-base text-ink-neutral dark:text-slate-400 leading-relaxed">
                    此操作将永久删除您的博文内容，包括所有评论和媒体文件。删除后将无法撤销，请确认是否继续操作。
                </p>
<!-- Actions -->
<div class="mt-8 flex flex-col gap-3 sm:flex-row-reverse sm:gap-4">
<button class="inline-flex w-full items-center justify-center rounded-lg px-6 py-3.5 text-sm font-bold text-white shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 transition-colors sm:w-auto flex-1 bg-red-400 hover:bg-red-500 focus-visible:outline-red-400" type="button">
                        确认删除
                    </button>
<button class="inline-flex w-full items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 px-6 py-3.5 text-sm font-bold text-slate-700 dark:text-slate-200 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors sm:w-auto flex-1" type="button">
                        取消
                    </button>
</div>
</div>
<!-- Footer Decorative Element -->
<div class="h-1.5 w-full bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</div>
</div>
<!-- Background Decorative Image (Ink Landscape Feel) -->
<div class="fixed bottom-0 left-0 w-full h-1/3 -z-10 opacity-10 pointer-events-none">
<img alt="Minimalist ink landscape painting with mountains" class="w-full h-full object-cover" data-alt="Monochrome ink painting of misty mountains" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3HvnRVDj83lsg0QqX23YAJ2Bbyl1rGaIeGPdnjtO6Lp_FKHnFi0T6KByQhgNTqtTjgoodi6_QWCA0M7xwqzJe5uJox91S7vBFgk1NVRnLofmYiJVsM3A4-fizQ_tTJFydGkakbYcXodhKL8laJonz65JrbShbwDFMAZLC8u_DG9YqPXnLem9FuCq_s1k4yXMeZEQ0mNqPzXFQPDsiAdRL6m-nEDAI1p2IWpqLrHEoOWEB0VEsjARhj89brXNpHEv8P_MkUOdrsiyH"/>
</div>
</body></html>
