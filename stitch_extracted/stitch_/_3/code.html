<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;family=Noto+Serif+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "Noto Serif SC", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">墨色山河 - 设置</h2>
</div>
<div class="flex flex-col gap-1 pb-20">
<!-- Account Security Section -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">账号安全</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 mx-2 rounded-xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 px-4 min-h-[56px] border-b border-slate-100 dark:border-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">账号 ID</p>
<div class="shrink-0"><p class="text-slate-500 dark:text-slate-400 text-base">12345678</p></div>
</div>
<div class="flex items-center gap-4 px-4 min-h-[56px] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">修改密码</p>
<div class="shrink-0 text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Notifications Section -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">通知设置</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 mx-2 rounded-xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 px-4 min-h-[56px] border-b border-slate-100 dark:border-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">推送通知</p>
<div class="shrink-0">
<div class="w-10 h-6 bg-primary rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
</div>
<div class="flex items-center gap-4 px-4 min-h-[56px] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">消息免打扰</p>
<div class="shrink-0 text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Appearance Section -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">个性外观</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 mx-2 rounded-xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 px-4 min-h-[56px] border-b border-slate-100 dark:border-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">深色模式</p>
<div class="shrink-0">
<div class="w-10 h-6 bg-slate-200 dark:bg-primary/40 rounded-full relative">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
</div>
<div class="flex items-center gap-4 px-4 min-h-[56px] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">字体大小</p>
<div class="shrink-0 flex items-center gap-1 text-slate-500">
<span class="text-sm">中</span>
<span class="material-symbols-outlined text-xl">chevron_right</span>
</div>
</div>
</div>
<!-- About Section -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">关于</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 mx-2 rounded-xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 px-4 min-h-[56px] border-b border-slate-100 dark:border-slate-800/50 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">当前版本</p>
<div class="shrink-0"><p class="text-slate-500 dark:text-slate-400 text-base">v 2.4.0</p></div>
</div>
<div class="flex items-center gap-4 px-4 min-h-[56px] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<p class="text-slate-900 dark:text-slate-100 text-base font-normal flex-1">隐私协议</p>
<div class="shrink-0 text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Logout Button -->
<div class="px-4 mt-12 mb-8">
<button class="w-full py-4 rounded-xl bg-red-50 dark:bg-red-950/20 text-red-500 dark:text-red-400 font-bold text-center border border-red-100 dark:border-red-900/50 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors">
                    退出登录
                </button>
<p class="text-center text-slate-400 text-xs mt-6 opacity-60">
                    墨色山河 · 见天地 见众生 见自己
                </p>
</div>
</div>
</div>
