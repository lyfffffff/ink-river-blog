<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>墨色山河 - 登录</title>
<style>
    body {
      min-height: 100dvh;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden p-4 md:p-8">
<!-- Aesthetic background element (Ink wash style representation) -->
<div class="absolute top-0 right-0 w-64 h-64 bg-slate-200/30 rounded-full blur-3xl -z-10 dark:bg-slate-800/20"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="w-full max-w-[440px] bg-white/80 dark:bg-slate-900/50 backdrop-blur-md p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 my-auto">
<!-- Header Section -->
<div class="flex flex-col items-center mb-10">
<div class="mb-6 text-primary">
<span class="material-symbols-outlined !text-5xl">brush</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">墨色山河</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">执笔墨色，共绘山河</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6">
<div>
<label class="block text-slate-700 dark:text-slate-300 text-sm font-medium mb-2" for="username">
                        用户名 / 邮箱
                    </label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="username" placeholder="请输入您的账号" type="text"/>
</div>
</div>
<div>
<div class="flex justify-between mb-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="password">
                            密码
                        </label>
<a class="text-primary text-sm hover:underline" href="#">忘记密码？</a>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="password" placeholder="请输入您的密码" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400" for="remember">记住登录状态</label>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-colors shadow-md shadow-primary/20" type="submit">
                    立即登录
                </button>
</form>
<!-- Divider -->
<!-- Social Logins -->
<p class="mt-8 text-center text-slate-500 dark:text-slate-400 text-sm">
                还没有账号？ 
                <a class="text-primary font-medium hover:underline" href="#">立即注册</a>
</p>
</div>
<!-- Footer Decoration -->
<div class="mt-12 text-slate-400 dark:text-slate-600 text-xs flex items-center gap-4 pb-4">
<span>© 2024 墨色山河</span>
<span class="w-1 h-1 rounded-full bg-slate-300"></span>
<span>隐私政策</span>
<span class="w-1 h-1 rounded-full bg-slate-300"></span>
<span>服务条款</span>
</div>
</div>
<!-- Decorative Ink Splash Background -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-5 -z-20 overflow-hidden">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-slate-900 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[50%] bg-primary rounded-full blur-[120px]"></div>
</div>
</body></html>
