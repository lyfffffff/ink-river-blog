<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6-72,200..800&amp;family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "Noto Sans SC", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', 'Noto Sans SC', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">立即注册</h2>
</div>
<!-- Header Content -->
<div class="px-4 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[36px] font-bold leading-tight text-left pb-2">创建您的账户</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">加入墨色山河，探索更多内容</p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-2 p-4 max-w-[480px]">
<!-- Username -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal pb-2">用户名</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="请输入用户名" type="text" value=""/>
</div>
</label>
</div>
<!-- Email -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal pb-2">电子邮箱</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="example@email.com" type="email" value=""/>
</div>
</label>
</div>
<!-- Password -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal pb-2">密码</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="请输入密码" type="password" value=""/>
</div>
</label>
</div>
<!-- Confirm Password -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal pb-2">确认密码</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="请再次输入密码" type="password" value=""/>
</div>
</label>
</div>
</div>
<!-- Terms Agreement -->
<div class="px-4 py-2 flex items-start gap-3">
<input class="mt-1 h-5 w-5 rounded border-slate-300 text-primary focus:ring-primary bg-white dark:bg-slate-900 dark:border-slate-800" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-snug" for="terms">
                我已阅读并同意 <a class="text-primary hover:underline" href="#">服务条款</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
</label>
</div>
<!-- Action Buttons -->
<div class="p-4 flex flex-col gap-4 mt-4">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl text-lg hover:opacity-90 transition-opacity">
                注册
            </button>
<div class="flex justify-center items-center py-4">
<p class="text-slate-600 dark:text-slate-400 text-sm">已有账户？</p>
<a class="text-primary font-bold text-sm ml-2" href="#">立即登录</a>
</div>
</div>
<!-- Decorative Element -->
<div class="mt-auto opacity-10 pointer-events-none fixed bottom-0 right-0 p-8">
<h3 class="text-6xl font-display italic">墨色山河</h3>
</div>
</div>
</body></html>
