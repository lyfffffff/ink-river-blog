<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>忘记密码 - 墨色山河</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', "Noto Sans SC", sans-serif;
        }
        .chinese-serif {
            font-family: "Noto Serif SC", serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<a class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 font-display">找回密码</h2>
</div>
<div class="flex flex-col items-center px-6 pt-12 pb-8">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center pb-2 font-display">重置您的密码</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal text-center max-w-xs">
                第一步：请输入注册邮箱以获取验证码，我们将向您的邮箱发送验证链接。
            </p>
</div>
<div class="max-w-[480px] mx-auto w-full px-6">
<div class="flex flex-col gap-6 py-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 ml-1">电子邮箱</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="example@mail.com" type="email" value=""/>
</div>
</label>
</div>
<div class="flex flex-col gap-4 py-3">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-slate-900 text-base font-bold leading-normal tracking-[0.015em] hover:opacity-90 transition-opacity shadow-lg shadow-primary/20">
<span class="truncate">发送验证码</span>
</button>
<div class="flex items-center justify-center mt-4">
<span class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></span>
<span class="px-4 text-xs text-slate-400 uppercase tracking-widest">或者</span>
<span class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></span>
</div>
<a class="flex w-full items-center justify-center h-12 text-primary text-sm font-semibold hover:underline decoration-2 underline-offset-4 transition-all" href="#">
                    返回登录页面
                </a>
</div>
</div>
<div class="mt-auto p-8 flex flex-col items-center">
<div class="flex items-center gap-2 mb-4">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
<p class="text-slate-400 text-xs font-display italic">墨色山河 - Ink Landscapes</p>
</div>
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</div>
<div class="absolute top-0 right-0 p-8 pointer-events-none opacity-10">
<span class="material-symbols-outlined text-9xl">brush</span>
</div>
</body></html>
