<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>墨色山河 - 退出登录</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<!-- Main Settings Page Container (Blurred Background) -->
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden filter blur-[2px] pointer-events-none">
<!-- Header -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-lg font-bold flex-1 text-center pr-10">设置</h2>
</div>
<!-- Settings List -->
<div class="flex flex-col gap-1 py-4">
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 px-4 pb-2 uppercase tracking-wider">账户与安全</h3>
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 px-4 py-4 border-y border-slate-100 dark:border-slate-800 justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">person</span>
<p class="text-base font-normal">个人资料</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 px-4 py-4 border-b border-slate-100 dark:border-slate-800 justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">lock</span>
<p class="text-base font-normal">修改密码</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 px-4 pb-2 pt-6 uppercase tracking-wider">常规</h3>
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 px-4 py-4 border-y border-slate-100 dark:border-slate-800 justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">notifications</span>
<p class="text-base font-normal">通知设置</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 px-4 py-4 border-b border-slate-100 dark:border-slate-800 justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">dark_mode</span>
<p class="text-base font-normal">深色模式</p>
</div>
<div class="w-10 h-5 bg-primary rounded-full relative">
<div class="absolute right-1 top-1 size-3 bg-white rounded-full"></div>
</div>
</div>
<div class="mt-10 px-4">
<button class="w-full py-4 bg-white dark:bg-slate-900 text-red-500 font-medium rounded-xl border border-red-100 dark:border-red-900/30 shadow-sm">
                    退出登录
                </button>
</div>
</div>
<!-- Bottom Navigation (Simulated) -->
<div class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-2 flex justify-around">
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">home</span>
<span class="text-xs">首页</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">explore</span>
<span class="text-xs">发现</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">person</span>
<span class="text-xs">我的</span>
</div>
</div>
</div>
<!-- Confirmation Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
<div class="w-full max-w-sm bg-white dark:bg-background-dark rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="p-8 text-center">
<!-- Icon/Brand Element -->
<div class="mx-auto size-16 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl">logout</span>
</div>
<h4 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-2">墨色山河</h4>
<p class="text-slate-600 dark:text-slate-400 text-base">确定要退出登录吗？</p>
<p class="text-slate-400 dark:text-slate-500 text-xs mt-1">退出后将无法接收实时通知</p>
</div>
<div class="flex flex-col border-t border-slate-100 dark:border-slate-800">
<button class="w-full py-4 text-red-500 font-bold text-base active:bg-red-50 dark:active:bg-red-950/20 transition-colors">
                    确认退出
                </button>
<button class="w-full py-4 text-slate-500 dark:text-slate-400 font-medium text-base border-t border-slate-100 dark:border-slate-800 active:bg-slate-50 dark:active:bg-slate-900 transition-colors">
                    取消
                </button>
</div>
</div>
</div>
</body></html>
